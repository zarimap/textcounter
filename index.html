<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>TurboWarpへテキスト送信（改行置換版）</title>
    <style>
        body {
            font-family: sans-serif;
            margin: 20px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        /* 改行できるようにtextarea（テキストエリア）に変更 */
        textarea {
            width: 485px;
            height: 80px;
            padding: 8px;
            font-size: 16px;
            resize: vertical; /* 上下にサイズ調整可能 */
        }
        iframe {
            width: 485px;
            height: 402px;
            border: none;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <h2>TurboWarp埋め込みへのリアルタイム送信</h2>

    <div class="form-group">
        <label for="scratchInput">メッセージを入力（Enterで改行すると自動で「/ 」に変換されます）:</label><br>
        <textarea id="scratchInput" placeholder="ここに文字を入力してください..."></textarea>
    </div>

    <iframe id="turbowarpIframe" src="https://turbowarp.org/embed.html#file=プロジェクト.sb3" allowtransparency="true" allowfullscreen></iframe>

    <script>
        const iframe = document.getElementById('turbowarpIframe');
        const textarea = document.getElementById('scratchInput');

        // 文字が入力されるたびに処理を実行
        textarea.addEventListener('input', (e) => {
            // 1. 入力された元の文字を取得
            let rawText = e.target.value;

            // 2. すべての改行コード（\n や \r\n）を「/ 」に置き換える
            let processedText = rawText.replace(/\r?\n/g, '/ ');

            // 3. postMessageを使ってTurboWarpのiframeへデータを送信
            //（※TurboWarp側の拡張機能が受け取れるオブジェクト形式で送信しています）
            iframe.contentWindow.postMessage({
                type: 'usertyping', 
                value: processedText
            }, '*');
        });
    </script>

</body>
</html>
